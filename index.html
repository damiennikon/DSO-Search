<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DSO Tracker</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111;
            --text-main: #ff3333;
            --text-dim: #882222;
            --accent: #ff0000;
            --bullseye: #00ff00;
            --warm: #00aaff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        .app-header {
            background-color: var(--panel-bg);
            padding: 15px;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            display: flex;
            position: relative;
            margin-bottom: 10px;
        }

        #dsoSearchInput {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background-color: #000;
            border: 1px solid var(--text-dim);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 16px;
        }

        #clearSearchBtn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            display: none;
        }

        .moon-toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffaa00;
            font-size: 0.9rem;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .moon-toggle-container input {
            transform: scale(1.3);
            accent-color: #ffaa00;
        }

        .category-filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .cat-btn {
            background-color: #000;
            color: var(--text-dim);
            border: 1px solid var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .cat-btn.active {
            background-color: var(--text-dim);
            color: #000;
            font-weight: bold;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            background-color: var(--panel-bg);
            border: 1px solid var(--text-dim);
            color: var(--text-main);
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }

        #dsoList { padding: 0 15px 20px 15px; display: flex; flex-direction: column; gap: 10px; }

        .dso-item {
            display: flex;
            align-items: center;
            background-color: var(--panel-bg);
            border: 1px solid #330000;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            color: var(--text-main);
        }

        .dso-item.dimmed { opacity: 0.4; }

        .dso-icon { width: 40px; height: 40px; margin-right: 15px; flex-shrink: 0; }
        
        .dso-text-group { flex: 1; }
        
        .dso-id { font-weight: bold; font-size: 1.1rem; }
        
        .dso-name { font-size: 0.85rem; color: var(--text-dim); margin-top: 2px; }
        
        .dso-status { font-size: 0.75rem; margin-top: 4px; font-weight: bold; }
        .status-up { color: #00ff00; }
        .status-down { color: #ff0000; }
        .status-warn { color: #ffaa00; }

        .dso-arrow { font-size: 1.5rem; color: var(--text-dim); }

        #showMoreBtn {
            width: calc(100% - 30px);
            margin: 0 15px 30px 15px;
            padding: 15px;
            background-color: #220000;
            border: 1px solid var(--accent);
            color: var(--text-main);
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--accent);
            border-radius: 12px;
            width: 100%; max-width: 400px;
            padding: 20px; text-align: center;
        }

        .modal-info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            text-align: left; margin: 20px 0; font-size: 0.9rem;
        }
        
        .modal-desc {
            text-align: left; font-size: 0.85rem; color: #ccc; margin-bottom: 20px; line-height: 1.4;
        }

        .modal-btn {
            width: 100%; padding: 15px; margin-top: 10px;
            border-radius: 8px; font-weight: bold; border: none;
        }

        .btn-primary { background-color: var(--accent); color: #fff; }
        .btn-secondary { background-color: transparent; border: 1px solid var(--text-dim); color: var(--text-main); }
        .btn-primary:disabled { background-color: #333; color: #666; }

        /* Camera UI */
        #cameraUI {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 300;
        }

        #cameraFeed {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Night Vision Filter Overlay */
        #cameraFilter {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.35); pointer-events: none;
            mix-blend-mode: multiply;
        }

        .hud-top {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        #backButton {
            background: rgba(0,0,0,0.5); border: 1px solid var(--accent); color: var(--accent);
            padding: 10px 15px; border-radius: 8px; font-weight: bold;
        }

        #activeTargetName { color: var(--accent); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 5px #000; }

        .center-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; pointer-events: none;
        }
        .center-crosshair::before, .center-crosshair::after {
            content: ''; position: absolute; background-color: rgba(255, 0, 0, 0.5);
        }
        .center-crosshair::before { top: 29px; left: 0; width: 60px; height: 2px; }
        .center-crosshair::after { left: 29px; top: 0; height: 60px; width: 2px; }

        /* 3-Tier Radar Elements */
        #yellowDot {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border-radius: 50%;
            display: none; transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        #directionArrow {
            position: absolute; top: 50%; left: 50%;
            font-size: 40px; display: none; text-shadow: 0 0 5px #000;
        }

        .compass-widget {
            position: absolute; bottom: 30px; right: 20px;
            width: 60px; height: 60px; border: 2px solid var(--accent); border-radius: 50%;
            background: rgba(0,0,0,0.5);
        }

        #compassNeedle {
            position: absolute; top: 5%; left: 45%;
            width: 10%; height: 90%; background: linear-gradient(to bottom, var(--accent) 50%, transparent 50%);
            transform-origin: center;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="search-container">
            <input type="text" id="dsoSearchInput" placeholder="Search targets (e.g. M 42, Orion)...">
            <button id="clearSearchBtn">×</button>
        </div>
        
        <label class="moon-toggle-container">
            <input type="checkbox" id="moonFilterToggle">
            🌕 Full Moon Mode (Hide faint targets)
        </label>

        <div class="category-filters">
            <button class="cat-btn active" data-cat="All">All</button>
            <button class="cat-btn" data-cat="Galaxy">Galaxies</button>
            <button class="cat-btn" data-cat="Nebula">Nebulae</button>
            <button class="cat-btn" data-cat="Cluster">Clusters</button>
        </div>
    </header>

    <div class="action-row">
        <button id="polarAlignBtn" class="action-btn">🔭 Polar Align</button>
        <button id="openCalBtn" class="action-btn" style="display:none;">📅 Planning</button>
    </div>

    <main id="dsoList"></main>
    <button id="showMoreBtn">Show More</button>

    <div id="polarModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Mount Alignment</h2>
            <p style="margin-bottom: 20px; color: #ccc; font-size: 0.9rem;">Select the celestial pole you wish to align your tracking mount to.</p>
            <button id="btnSCP" class="modal-btn btn-primary">Locate SCP (South)</button>
            <button id="btnNCP" class="modal-btn btn-primary" style="margin-top: 15px;">Locate NCP (Reverse/North)</button>
            <button id="closePolarModalBtn" class="modal-btn btn-secondary" style="margin-top: 20px;">Cancel</button>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIcon" style="width: 60px; height: 60px; margin: 0 auto;"></div>
            <h2 id="modalTitle" style="margin-top: 10px;"></h2>
            <div id="modalId" style="color: var(--text-dim); font-weight: bold;"></div>
            
            <div class="modal-info-grid">
                <div><strong>Type:</strong> <span id="modalType"></span></div>
                <div><strong>Season:</strong> <span id="modalSeason"></span></div>
                <div><strong>Distance:</strong> <span id="modalDist"></span></div>
                <div id="modalAlt" style="grid-column: span 2; text-align: center; font-weight: bold; margin-top: 10px;"></div>
            </div>

            <div id="modalDesc" class="modal-desc"></div>

            <button id="locateBtn" class="modal-btn btn-primary">Locate in Sky</button>
            <button id="closeModalBtn" class="modal-btn btn-secondary">Close</button>
        </div>
    </div>

    <div id="calOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2>Imaging Plan</h2>
            <p style="margin: 20px 0; color: #888;">Calendar integration coming soon.</p>
            <button id="closeCalBtn" class="modal-btn btn-secondary">Close</button>
        </div>
    </div>

    <div id="cameraUI">
        <video id="cameraFeed" autoplay playsinline></video>
        <div id="cameraFilter"></div> <div class="hud-top">
            <button id="backButton">❮ Back</button>
            <div id="activeTargetName">Target</div>
            <div style="width: 60px;"></div>
        </div>

        <div class="center-crosshair"></div>
        <div id="directionArrow">➔</div>
        <div id="yellowDot"></div>

        <div class="compass-widget">
            <div id="compassNeedle"></div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker Registered"))
            .catch(err => console.error("SW Registration Failed", err));
        }
    </script>
</body>
</html>
